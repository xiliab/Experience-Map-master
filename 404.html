<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — 偏离路线 | LLXiao 体验地图</title>
  <!-- 引入主样式表以复用字体 -->
  <link rel="stylesheet" href="assets/main.min.css"/>
  <style>
    /* 强制浅色模式背景与布局 */
    body {
      margin: 0;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      height: auto;
      min-height: 100vh;
      min-height: 100svh;
      flex-direction: column;
      overflow-x: hidden;
      background-color: #f5f5f7;
      background-image: radial-gradient(#ccc 0.5px, transparent 0.5px), radial-gradient(#ccc 0.5px, transparent 0.5px);
      background-size: 14px 14px;
      background-position: 0 0, 7px 7px;
      color: #222;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    
    /* 核心卡片容器：毛玻璃与倾斜语言 */
    .card {
      background: rgba(255, 255, 255, 0.68);
      border-radius: 1.5rem 0.5rem 1.5rem 0.5rem;
      padding: 3.5rem 4rem;
      box-shadow: 10px 10px 40px rgba(0, 0, 0, 0.06), inset 0 0 0 1px rgba(255, 255, 255, 0.72);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      text-align: center;
      max-width: 600px;
      width: 100%;
      position: relative;
      isolation: isolate;
      overflow: visible;
      transform: skewX(-16deg);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.5);
      box-shadow: -10px 10px 40px rgba(0, 0, 0, 0.05), inset 0 0 0 1px rgba(255, 255, 255, 0.62);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      transform: skewX(32deg);
      transform-origin: center;
      pointer-events: none;
    }
    
    /* 内容反向倾斜摆正 */
    .card-inner {
      transform: skewX(16deg);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    /* 插画容器 */
    .illustration {
      width: 320px;
      height: 200px;
      margin-bottom: 1.5rem;
    }

    /* 浮动动画 */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .float {
      animation: float 4s ease-in-out infinite;
    }

    /* 文本排版 */
    h1 {
      font-size: 5rem;
      color: #e60000;
      margin: 0;
      line-height: 1;
      text-shadow: 3px 3px 0 rgba(230, 0, 0, 0.08);
    }

    h2 {
      font-size: 1.5rem;
      color: #222;
      margin: 1rem 0 0.5rem;
      font-weight: 700;
    }

    p {
      color: #666;
      line-height: 1.6;
      margin: 0.5rem 0 2.5rem;
      font-size: 1.05rem;
    }

    /* 按钮样式 */
    .btn-return {
      display: inline-block;
      text-decoration: none;
      padding: 0.9rem 2.8rem;
      background: #222;
      color: #fff;
      font-size: 1.1rem;
      border-radius: 0.5rem 0.2rem 0.5rem 0.2rem;
      transition: all 0.25s ease;
      cursor: pointer;
      transform: skewX(-9deg);
    }

    .btn-return span {
      display: inline-block;
      transform: skewX(9deg);
    }

    .btn-return:hover {
      background: #e60000;
      color: #fff;
      border-bottom-color: transparent;
      box-shadow: 0 6px 20px rgba(230, 0, 0, 0.2);
    }

    /* 联系方式栏 */
    .contact {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px dashed #ddd;
      font-size: 0.95rem;
      color: #666;
      width: 100%;
    }

    .contact a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #222;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.2s;
    }

    .contact a:hover {
      color: #e60000;
    }

    @media (max-width: 720px) {
      body {
        padding: 1rem;
        align-items: stretch;
      }

      .card {
        width: auto;
        max-width: none;
        padding: 2rem 1.5rem;
        border-radius: 1rem 0.35rem 1rem 0.35rem;
        transform: skewX(-11deg);
      }

      .card::before {
        transform: skewX(22deg);
      }

      .card-inner {
        transform: skewX(11deg);
      }

      .illustration {
        width: min(100%, 280px);
        height: auto;
        aspect-ratio: 320 / 200;
      }

      h1 {
        font-size: clamp(3.5rem, 18vw, 5rem);
      }

      h2 {
        font-size: 1.25rem;
      }

      p {
        font-size: 1rem;
        margin-bottom: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-inner">
      <!-- 手工打造的设计师风格 SVG 矢量插画（钢笔工具与锚点） -->
      <svg class="illustration float" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f0f0f0" stroke-width="1"/>
          </pattern>
        </defs>
        <!-- 透明网格画板底底图 -->
        <rect width="320" height="200" fill="url(#grid)" rx="12" ry="12"/>
        
        <!-- 设计师标志性元素：断开的钢笔路径 -->
        <path d="M 60 140 C 100 140, 110 60, 160 60 C 210 60, 220 130, 260 130" fill="none" stroke="#e60000" stroke-width="4" stroke-dasharray="8 8"/>
        
        <!-- 控制手柄 (Bezier Handle) -->
        <line x1="160" y1="60" x2="110" y2="40" stroke="#aaa" stroke-width="2"/>
        <circle cx="110" cy="40" r="4" fill="#fff" stroke="#aaa" stroke-width="2"/>
        
        <!-- 锚点 (Anchor Points) -->
        <rect x="56" y="136" width="8" height="8" fill="#fff" stroke="#e60000" stroke-width="2"/>
        <rect x="156" y="56" width="8" height="8" fill="#fff" stroke="#e60000" stroke-width="2"/>
        <rect x="256" y="126" width="8" height="8" fill="#fff" stroke="#e60000" stroke-width="2"/>
        
        <!-- 未连接/报错图标 -->
        <path d="M 175 45 L 195 65 L 185 85 L 215 105 L 195 125" fill="none" stroke="#222" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
        
        <!-- UI 占位块 404 -->
        <rect x="80" y="80" width="40" height="40" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="2"/>
        <text x="100" y="108" font-size="24" font-family="monospace" font-weight="bold" fill="#222" text-anchor="middle">4</text>
        
        <rect x="130" y="110" width="40" height="40" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="2"/>
        <text x="150" y="138" font-size="24" font-family="monospace" font-weight="bold" fill="#e60000" text-anchor="middle">0</text>
        
        <rect x="180" y="90" width="40" height="40" rx="8" fill="#f8f8f8" stroke="#ddd" stroke-width="2"/>
        <text x="200" y="118" font-size="24" font-family="monospace" font-weight="bold" fill="#222" text-anchor="middle">4</text>
        
        <!-- 鼠标指针 -->
        <path d="M 230 145 L 245 170 L 235 170 L 240 185 L 232 187 L 227 172 L 217 177 Z" fill="#222" stroke="#fff" stroke-width="1.5"/>
      </svg>
      
      <h1 class="title-font">404</h1>
      <h2 class="title-font">似乎偏离了主线任务</h2>
      <p>抱歉，您访问的节点不存在或已被移除。<br>就像在一张庞大的体验地图中，走到了尚未被设计的边缘。</p>
      
      <a href="/" class="btn-return">
        <span class="title-font">返回地图原点</span>
      </a>
      
      <div class="contact">
        探讨设计或报告问题？欢迎随时与我联系：<br>
        <a href="mailto:xiliab@icloud.com" style="margin-top: 0.8rem;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          xiliab@icloud.com
        </a>
      </div>
    </div>
  </div>
</body>
</html>
